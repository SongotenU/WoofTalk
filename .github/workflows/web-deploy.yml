name: Next.js Web — Vercel Deployment

on:
  push:
    paths:
      - 'web/**'
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run lint
      - run: cd web && npm test --if-present

  rls-audit:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Check for insecure RLS policies
        run: |
          insecure=$(grep -rl 'WITH CHECK (true)\|USING (true)' supabase/migrations/ 2>/dev/null || true)
          if [ -n "$insecure" ]; then
            echo "WARNING: Found overly permissive RLS policies:"
            echo "$insecure"
            exit 1
          fi
          echo "RLS audit passed — no open policies found"

  deploy:
    runs-on: ubuntu-latest
    needs: [verify, rls-audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel --prod --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" \
            --project="$VERCEL_PROJECT_ID"