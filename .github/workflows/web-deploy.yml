name: Next.js Web — Vercel Deployment

on:
  push:
    paths:
      - 'web/**'
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run lint
      - run: cd web && npm test --if-present

  rls-audit:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Check for insecure RLS policies
        run: |
          # Check for actual policy definitions with permissive checks (excluding comments)
          # Look for WITH CHECK (true) or USING (true) patterns on the same line (not in comments)
          found=0
          for f in supabase/migrations/*.sql; do
            # Skip comment lines and check for insecure patterns
            if grep -n 'WITH CHECK (true)\|USING (true)' "$f" 2>/dev/null | grep -v '^\s*--' > /tmp/rls_check.txt; then
              if [ -s /tmp/rls_check.txt ]; then
                echo "ERROR: Found insecure RLS policy in $f:"
                cat /tmp/rls_check.txt
                found=1
              fi
            fi
          done
          rm -f /tmp/rls_check.txt
          if [ "$found" -eq 1 ]; then
            exit 1
          fi
          echo "RLS audit passed — no insecure policies found"

  deploy:
    runs-on: ubuntu-latest
    needs: [verify, rls-audit]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel --prod --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" \
            --project="$VERCEL_PROJECT_ID" \
            --confirm > /tmp/vercel-output.txt
          cat /tmp/vercel-output.txt
          # Extract deployment URL from output
          DEPLOY_URL=$(grep -o 'https://[^ ]*' /tmp/vercel-output.txt | head -1)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
      - name: Production health check
        env:
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
        run: |
          sleep 10
          curl -sf "$DEPLOY_URL/api/health" || (echo "Health check failed" && exit 1)
          echo "Health check passed at $DEPLOY_URL/api/health"