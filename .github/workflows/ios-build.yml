name: iOS Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install dependencies
        run: |
          cd ios
          pod install --repo-update
        env:
          CI: true

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild \
            -workspace WoofTalk.xcworkspace \
            -scheme WoofTalk \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/WoofTalk.xcarchive \
            clean archive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_DEVELOPER_TEAM_ID }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}"
        env:
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}

      - name: Export IPA
        run: |
          cd ios
          xcodebuild \
            -exportArchive \
            -archivePath build/WoofTalk.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist
        env:
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WoofTalk-iOS-${{ github.sha }}
          path: ios/build/export/*.ipa
          retention-days: 30

      - name: Upload dSYM Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WoofTalk-dSYM-${{ github.sha }}
          path: ios/build/WoofTalk.xcarchive/dSYMs/
          retention-days: 30
