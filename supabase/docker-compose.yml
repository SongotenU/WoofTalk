services:
  db:
    image: supabase/postgres:15.4.0.57
    container_name: supabase_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c shared_preload_libraries='pg_stat_statements' # for RLS policies
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2097kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    networks:
      - supabase

  auth-db-init:
    image: supabase/postgres:15.4.0.57
    container_name: auth_db_initializer
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    volumes:
      - ./scripts/init-auth.sh:/docker-entrypoint-initdb.d/init-auth.sh:ro
    command: >
      sh -c "
      export PGPASSWORD=postgres &&
      sleep 5 &&
      psql -h db -U postgres -d postgres -c \"CREATE ROLE anon NOINHERIT LOGIN PASSWORD '\''ANON_KEY'\'';\" || true &&
      psql -h db -U postgres -d postgres -c \"CREATE ROLE authenticator NOINHERIT LOGIN PASSWORD '\''postgres'\'';\" || true &&
      psql -h db -U postgres -d postgres -c \"GRANT anon TO authenticator;\" || true &&
      psql -h db -U postgres -d postgres -c \"CREATE DATABASE postgres;\" || true &&
      psql -h db -U postgres -d postgres -c \"ALTER USER postgres WITH PASSWORD '\''postgres'\'';\" || true &&
      echo 'Auth database initialized successfully'
      "
    networks:
      - supabase

  kong:
    image: kong:3.4
    container_name: supabase_kong
    depends_on:
      db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
      - "8444:8444"
    volumes:
      - ./config/kong.yml:/kong.yml:ro
    networks:
      - supabase

  inbucket:
    image: inbucket/inbox:1.10.1
    container_name: supabase_inbucket
    ports:
      - "9000:9000"
      - "2500:2500"
      - "1100:1100"
    networks:
      - supabase

volumes:
  db-data:

networks:
  supabase:
    driver: bridge
