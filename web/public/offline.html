<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoofTalk - You're Offline</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f9fafb;
      color: #111827;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    h1 { color: #16a34a; margin-bottom: 0.5rem; }
    p { color: #6b7280; line-height: 1.6; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #15803d; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🐕</div>
    <h1>You're Offline</h1>
    <p>WoofTalk needs an internet connection for translations. Some features may be unavailable while offline.</p>
    <p style="font-size: 0.875rem; margin-top: 1rem;">Your recent translations are still available below.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
